name: Publish Blog Posts

on:
  schedule:
    - cron: '0 13,19 * * *'  # 9am and 3pm EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and publish queued posts
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          QUEUE_FILE="content/auto-blog-queue.json"

          if [ ! -f "$QUEUE_FILE" ]; then
            echo "No queue file found"
            exit 0
          fi

          # Find posts that are queued and scheduled for today or earlier
          UPDATED=$(node -e "
            const fs = require('fs');
            const queue = JSON.parse(fs.readFileSync('$QUEUE_FILE', 'utf-8'));
            let changed = false;
            queue.posts.forEach(post => {
              if (post.status === 'queued' && post.scheduledDate <= '$TODAY') {
                post.status = 'published';
                changed = true;
                console.error('Publishing: ' + post.slug);
              }
            });
            if (changed) {
              fs.writeFileSync('$QUEUE_FILE', JSON.stringify(queue, null, 2) + '\n');
              console.log('true');
            } else {
              console.log('false');
            }
          ")

          if [ "$UPDATED" = "true" ]; then
            echo "POSTS_UPDATED=true" >> $GITHUB_ENV
          else
            echo "No posts to publish"
          fi

      - name: Commit and push
        if: env.POSTS_UPDATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/auto-blog-queue.json
          git commit -m "chore: publish scheduled blog posts"
          git push
